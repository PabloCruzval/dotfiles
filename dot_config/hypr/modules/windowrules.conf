# Window rules
windowrule = workspace 2, match:title .*Brave.*
windowrule = workspace 3, match:title .*Visual Studio.*
windowrule = workspace 4, match:title .*Obsidian.*
windowrule = workspace 4, match:title .*Dolphin.*
windowrule = workspace 5, match:title .*Discord.*
windowrule = workspace 5, match:title .*Telegram.*
windowrule = workspace 8, match:title .*music\.youtube\.com.*

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
